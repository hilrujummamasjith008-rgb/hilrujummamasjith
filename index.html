<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hilru Jumma Masjith — Family DB</title>
<style>
 body {
  font-family: var(--font-sans, system-ui, sans-serif);
  background: var(--color-background-tertiary, #f4f5f4);

  /* Background Image */
  body {
  font-family: var(--font-sans, system-ui, sans-serif);

  background-image: url('./logo7.jpg');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;

  color: var(--color-text-primary, #0a0a0a);
  min-height: 100vh;
}
}
  
/* ===== LOGIN PAGE ===== */
 #login-screen{
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;background:linear-gradient(135deg,#f8faf9 0%,#b8e418 60%,#1a472a 100%);
  padding:20px;
}

.login-card{
  background:white;border-radius:20px;padding:36px 32px;width:100%;max-width:380px;
  box-shadow:0 20px 60px rgba(0,0,0,0.25);
}
.login-logo{text-align:center;margin-bottom:24px}
.login-logo .licon{
  width:64px;height:64px;background:#1a472a;border-radius:16px;
  display:inline-flex;align-items:center;justify-content:center;font-size:30px;margin-bottom:12px;
}
.login-logo h2{font-size:18px;font-weight:600;color:#1a1a1a}
.login-logo p{font-size:12px;color:#666;margin-top:3px}
.login-divider{border:none;border-top:1px solid #eee;margin:20px 0}
.login-label{font-size:12px;font-weight:500;color:#444;display:block;margin-bottom:5px}
.login-input{
  width:100%;padding:10px 13px;border:1px solid #ddd;border-radius:10px;
  font-size:14px;outline:none;transition:border-color 0.2s,box-shadow 0.2s;
  font-family:inherit;background:#fafafa;
}
.login-input:focus{border-color:#f4f7f5;box-shadow:0 0 0 3px rgba(17, 248, 98, 0.1);background:#fcfcfc}
.login-field{margin-bottom:14px}
.login-btn{
  width:100%;padding:11px;background:#021f0c;color:white;border:none;
  border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;
  transition:background 0.2s,transform 0.1s;margin-top:6px;font-family:inherit;
}
.login-btn:hover{background:#000c00}
.login-btn:active{transform:scale(0.99)}
.login-btn:disabled{background:#888;cursor:not-allowed}
.login-error{
  background:#fde8e8;color:#c0392b;border-radius:8px;padding:9px 12px;
  font-size:12px;margin-top:10px;display:none;
}
.login-footer{text-align:center;font-size:11px;color:#999;margin-top:18px}
.login-loading{display:none;text-align:center;padding:20px;color:#666;font-size:13px}
.lspinner{display:inline-block;width:18px;height:18px;border:2px solid #d4edda;border-top-color:#1a472a;border-radius:50%;animation:spin 0.8s linear infinite;margin-right:6px;vertical-align:middle}

/* ===== MAIN APP (hidden until logged in) ===== */
#app-screen{display:none}

/* ===== USER BAR ===== */
.user-bar{
  background:rgba(10, 10, 10, 0.08);border-top:1px solid rgba(255,255,255,0.1);
  padding:6px 14px;display:flex;align-items:center;gap:8px;
}
.user-bar .ub-email{font-size:11px;opacity:0.75;flex:1}
.user-bar .ub-name{font-size:12px;font-weight:400}
.signout-btn{
  background:rgba(255,255,255,0.12);border:none;color:white;
  padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;
  transition:background 0.15s;font-family:inherit;
}
.signout-btn:hover{background:rgba(255,255,255,0.22)}

/* ===== REST OF APP STYLES ===== */
.app-header{background:#f3f7f4;color:rgb(5, 5, 5);padding:12px 16px;display:flex;align-items:center;gap:60px}
.app-header .logo{width:80px;height:100px;background:rgba(255,255,255,0.15);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.app-header h1{font-size:18px;font-weight:800}
.app-header p{font-size:15px;opacity:0.75;margin-top:1px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#07ec0f;margin-left:auto;flex-shrink:0}
.sync-dot.syncing{background:#2eee08;animation:pulse 1s infinite}
.sync-dot.offline{background:#ee1505}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.nav-tabs{background:var(--color-background-primary,#fff);border-bottom:0.5px solid var(--color-border-tertiary,#e0e0e0);display:flex;overflow-x:auto}
.nav-tab{padding:15px 14px;font-size:12px;font-weight:500;cursor:pointer;border-bottom:5px solid transparent;color:var(--color-text-secondary,#0f0f0f);white-space:nowrap;transition:all 0.15s}
.nav-tab.active{border-bottom-color:#1a472a;color:#1a472a}
.content{padding:14px;max-width:860px;margin:0 auto;position:relative}
.card{background:var(--color-background-primary,#fff);border:0.5px solid var(--color-border-tertiary,#e0e0e0);border-radius:12px;padding:14px;margin-bottom:12px}
.card-title{font-size:10px;font-weight:500;color:#1a472a;margin-bottom:10px;display:flex;align-items:center;gap:7px}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:9px}
.fg{display:flex;flex-direction:column;gap:3px}
.fg label{font-size:11px;color:var(--color-text-secondary,#666);font-weight:500}
.fg input,.fg select,.fg textarea{padding:7px 9px;border:0.5px solid var(--color-border-secondary,#ccc);border-radius:8px;font-size:13px;background:var(--color-background-primary,#fff);color:var(--color-text-primary,#1a1a1a);outline:none;font-family:inherit}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:#1a472a;box-shadow:0 0 0 2px rgba(26,71,42,0.1)}
.fg textarea{resize:vertical;min-height:56px}
.fg.full{grid-column:1/-1}
.member-row{background:var(--color-background-secondary,#f8f8f5);border-radius:8px;padding:10px;margin-bottom:8px;position:relative}
.member-row .rm{position:absolute;top:8px;right:8px;background:none;border:none;color:#c0392b;cursor:pointer;font-size:13px;padding:2px 6px;border-radius:4px}
.member-row .rm:hover{background:#fde8e8}
.ml{font-size:11px;font-weight:500;color:var(--color-text-secondary);margin-bottom:7px}
.btn{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:0.5px solid;transition:all 0.15s;font-family:inherit}
.btn-p{background:#021d0b;color:white;border-color:#1a472a}
.btn-p:hover{background:#001106}
.btn-s{background:transparent;color:#1a472a;border-color:#1a472a}
.btn-s:hover{background:rgba(250, 9, 9, 0.918)}
.btn-d{background:transparent;color:#c0392b;border-color:#c0392b}
.btn-d:hover{background:#fde8e8}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px}
.search-bar input{width:100%;padding:9px 13px;border:0.5px solid var(--color-border-secondary,#ccc);border-radius:8px;font-size:14px;background:var(--color-background-primary,#fff);color:var(--color-text-primary,#1a1a1a);outline:none;font-family:inherit;margin-bottom:14px}
.search-bar input:focus{border-color:#1a472a}
.fi{background:var(--color-background-primary,#fff);border:0.5px solid var(--color-border-tertiary);border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:11px;transition:all 0.15s}
.fi:hover{border-color:#1a472a}
.av{border-radius:50%;background:#d4edda;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;color:#1a472a;flex-shrink:0}
.fn{font-size:13px;font-weight:500}
.fnic{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.tags{display:flex;flex-wrap:wrap;margin-top:3px;gap:4px}
.tag{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500}
.tg{background:#d4edda;color:#1a472a}.ta{background:#fef3cd;color:#856404}
.tb{background:#dbeafe;color:#1e40af}.tr{background:#fde8e8;color:#c0392b}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:12px}
.sc{background:var(--color-background-primary,#fff);border:0.5px solid var(--color-border-tertiary);border-radius:10px;padding:11px 13px}
.sc .sn{font-size:22px;font-weight:500;color:#1a472a}
.sc .sl{font-size:11px;color:var(--color-text-secondary);margin-top:1px}
.empty{text-align:center;padding:36px 16px;color:var(--color-text-secondary)}
.empty .ei{font-size:36px;margin-bottom:10px}
.empty p{font-size:13px}
.ph{background:#1a472a;color:white;border-radius:12px;padding:16px;margin-bottom:12px;display:flex;align-items:flex-start;gap:13px;flex-wrap:wrap}
.ph h2{font-size:17px;font-weight:500}
.ph p{font-size:12px;opacity:0.8;margin-top:2px}
.ii{padding:7px 11px;border-radius:8px;background:var(--color-background-secondary,#f8f8f5);margin-bottom:7px}
.ii .il{font-size:10px;color:var(--color-text-secondary);font-weight:500;text-transform:uppercase;letter-spacing:0.3px}
.ii .iv{font-size:13px;font-weight:500;margin-top:1px}
.mc{background:var(--color-background-secondary,#f8f8f5);border-radius:8px;padding:9px 11px;margin-bottom:6px;display:flex;align-items:center;gap:9px}
.mc .mn{font-size:13px;font-weight:500}
.mc .md{font-size:11px;color:var(--color-text-secondary);margin-top:1px}
.back-btn{display:flex;align-items:center;gap:5px;background:none;border:none;color:var(--color-text-secondary);cursor:pointer;font-size:13px;margin-bottom:10px;padding:3px 0;font-family:inherit}
.back-btn:hover{color:var(--color-text-primary)}
.rb{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500}
.ry{background:#d4edda;color:#1a472a}.rn{background:rgba(255,255,255,0.15);color:white}
.toast-msg{position:fixed;bottom:20px;right:20px;background:#1a472a;color:white;padding:9px 14px;border-radius:8px;font-size:12px;z-index:999;animation:sli 0.3s,fdo 0.3s 2.5s forwards;pointer-events:none}
@keyframes sli{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fdo{to{opacity:0}}
.page{display:none}.page.active{display:block}
.ig{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:7px}
.loading-overlay{text-align:center;padding:40px;color:var(--color-text-secondary);font-size:13px}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid #d4edda;border-top-color:#1a472a;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:8px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== QURBANI NGO STYLES ===== */
.qcat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:16px}
.qcat-card{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:16px 14px;cursor:pointer;transition:all 0.18s;text-align:center;position:relative}
.qcat-card:hover{border-color:#1a472a;box-shadow:0 4px 14px rgba(26,71,42,0.12);transform:translateY(-2px)}
.qcat-card.active{border-color:#1a472a;background:#f0f8f3;box-shadow:0 4px 14px rgba(26,71,42,0.18)}
.qcat-icon{font-size:30px;margin-bottom:7px}
.qcat-count{font-size:26px;font-weight:700;color:#1a472a}
.qcat-label{font-size:12px;color:#555;margin-top:3px;font-weight:500}
.qcat-sub{font-size:10px;color:#999;margin-top:2px}
.qcat-list-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.qcat-list-title{font-size:14px;font-weight:600;color:#1a472a;display:flex;align-items:center;gap:7px}
.export-btn{background:#1a472a;color:#fff;border:none;padding:6px 13px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;transition:background 0.15s}
.export-btn:hover{background:#153d23}
.qno-select{display:none}
.chk-grid{display:flex;flex-wrap:wrap;gap:6px 10px;margin-top:6px}
.chk-lbl{display:flex;align-items:center;gap:5px;font-size:12px;color:#333;cursor:pointer;background:#f4f7f5;border:1px solid #dde8e3;border-radius:7px;padding:5px 9px;transition:background 0.12s}
.chk-lbl:hover{background:#e0f0e8}
.chk-lbl input{accent-color:#1a472a;cursor:pointer}
.section-label{font-size:11px;color:#888;font-weight:500;display:block;margin-bottom:2px}
</style>
</head>
<body>

<!-- ===== LOGIN SCREEN ===== -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <img src="logo.png"  width="150" height="150">
      <h2>Hilru Jumma Masjith Neithal Nager - Muthur</h2>
      <p>Family Database — Staff Login</p>
    </div>
    <hr class="login-divider">

    <!-- Sign In Form -->
    <div id="signin-form">
      <div class="login-field">
        <label class="login-label">Email address</label>
        <input class="login-input" type="email" id="login-email" placeholder="admin@masjith.com" autocomplete="email"/>
      </div>
      <div class="login-field">
        <label class="login-label">Password</label>
        <input class="login-input" type="password" id="login-pass" placeholder="Enter your password" autocomplete="current-password"/>
      </div>
      <button class="login-btn" id="login-btn" onclick="doSignIn()">Sign In</button>
      <div class="login-error" id="login-error"></div>
    </div>

    <div class="login-loading" id="login-loading">
      <span class="lspinner"></span> Signing in...
    </div>

    <div class="login-footer">🔒 Authorized Personnel Only</div>
    <div class="login-footer">    Powered by @Adept Tech</div>
  </div>
</div>

<!-- ===== MAIN APP SCREEN (shown after login) ===== -->
<div id="app-screen">
  <div class="app-header">
     <div class="logo"><img src="logo.png" width="150"></div>
    <div>
      <h1>Hilru Jumma Masjith — Family DB</h1>
      <p>Community welfare &amp; Data management</p>
    </div>
    <div class="sync-dot" id="sync-dot" title="Sync status"></div>
  </div>
  <!-- User bar -->
  <div class="app-header" style="padding:6px 16px;background:#153d23">
    <div style="font-size:11px;opacity:0.75;flex:1" id="user-email-display"></div>
    <button class="signout-btn" onclick="doSignOut()">Sign out</button>
  </div>

  <div class="nav-tabs">
    <div class="nav-tab active" onclick="showTab('dashboard')">Dashboard</div>
    <div class="nav-tab" onclick="showTab('search')">Search</div>
    <div class="nav-tab" onclick="showTab('add')">Add Family</div>
    <div class="nav-tab" onclick="showTab('aswesuma')">Aswesuma List</div>
    <div class="nav-tab" onclick="showTab('qurbani')" style="font-weight:600">Relief List</div>
  </div>

  <div class="content">
    <div id="tab-dashboard" class="page active"><div class="loading-overlay"><div class="spinner"></div><br>Loading from Firebase...</div></div>
    <div id="tab-search" class="page"></div>
    <div id="tab-add" class="page"></div>
    <div id="tab-aswesuma" class="page"></div>
    <div id="tab-profile" class="page"></div>
    <div id="tab-qurbani" class="page"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getFirestore, collection, doc, setDoc, getDocs, deleteDoc, query, orderBy, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

const firebaseConfig = {
  apiKey: "AIzaSyBbg4_VteWoigiHE25H_ZMIqZPwIXKiR38",
  authDomain: "hilrujummamasjith.firebaseapp.com",
  projectId: "hilrujummamasjith",
  storageBucket: "hilrujummamasjith.firebasestorage.app",
  messagingSenderId: "928041924086",
  appId: "1:928041924086:web:369f6add2e5c13f571c3d7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const COL = 'families';

var DB = [];
var editId = null;
var memberCount = 0;
var unsubscribeSnapshot = null;

// ===== AUTH FUNCTIONS =====

window.doSignIn = async function(){
  var email = document.getElementById('login-email').value.trim();
  var pass = document.getElementById('login-pass').value;
  var errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  if(!email || !pass){ errEl.textContent='Please enter email and password.'; errEl.style.display='block'; return; }
  document.getElementById('signin-form').style.display='none';
  document.getElementById('login-loading').style.display='block';
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch(e) {
    document.getElementById('signin-form').style.display='block';
    document.getElementById('login-loading').style.display='none';
    var msg = 'Sign in failed. Please check your credentials.';
    if(e.code==='auth/user-not-found'||e.code==='auth/wrong-password'||e.code==='auth/invalid-credential') msg='Incorrect email or password.';
    else if(e.code==='auth/too-many-requests') msg='Too many failed attempts. Please try again later.';
    else if(e.code==='auth/invalid-email') msg='Invalid email address.';
    errEl.textContent = msg;
    errEl.style.display = 'block';
  }
};

window.doSignOut = async function(){
  if(unsubscribeSnapshot){ unsubscribeSnapshot(); unsubscribeSnapshot=null; }
  await signOut(auth);
};

// Allow Enter key to submit login
document.getElementById('login-pass').addEventListener('keydown', function(e){
  if(e.key==='Enter') window.doSignIn();
});
document.getElementById('login-email').addEventListener('keydown', function(e){
  if(e.key==='Enter') document.getElementById('login-pass').focus();
});

// ===== AUTH STATE LISTENER =====
onAuthStateChanged(auth, function(user){
  if(user){
    // Logged in — show app
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app-screen').style.display='block';
    document.getElementById('user-email-display').textContent='Signed in as: ' + user.email;
    // Reset login form for next time
    document.getElementById('signin-form').style.display='block';
    document.getElementById('login-loading').style.display='none';
    document.getElementById('login-error').style.display='none';
    // Start Firestore listener
    startSnapshot();
  } else {
    // Logged out — show login
    document.getElementById('login-screen').style.display='flex';
    document.getElementById('app-screen').style.display='none';
    DB = [];
  }
});

function startSnapshot(){
  if(unsubscribeSnapshot) unsubscribeSnapshot();
  unsubscribeSnapshot = onSnapshot(
    query(collection(db, COL), orderBy('addedAt','desc')),
    function(snap){
      DB = snap.docs.map(function(d){ return d.data(); });
      setSyncDot('online');
      var cur = document.querySelector('#app-screen .page.active');
      if(cur && cur.id==='tab-dashboard') renderDash();
      if(cur && cur.id==='tab-aswesuma') renderAswesuma();
      if(cur && cur.id==='tab-qurbani') renderQurbani(null);
    },
    function(err){
      setSyncDot('offline');
      console.log('Snapshot error:', err);
    }
  );
}

// ===== HELPERS =====

function setSyncDot(state){
  var d=document.getElementById('sync-dot');if(!d)return;
  d.className='sync-dot'+(state==='syncing'?' syncing':state==='offline'?' offline':'');
  d.title=state==='syncing'?'Syncing...':state==='offline'?'Offline':'Connected to Firebase';
}

function ini(n){if(!n)return'?';var p=n.trim().split(' ');return p.length>1?(p[0][0]+p[p.length-1][0]).toUpperCase():n[0].toUpperCase()}

function toast(msg){
  var old=document.querySelector('.toast-msg');if(old)old.remove();
  var t=document.createElement('div');t.className='toast-msg';t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(function(){if(t.parentNode)t.remove()},2800);
}

function showTab(tab,id){
  document.querySelectorAll('.nav-tab').forEach(function(t,i){
    t.classList.toggle('active',['dashboard','search','add','aswesuma','qurbani'].indexOf(tab)===i);
  });
  document.querySelectorAll('#app-screen .page').forEach(function(p){p.classList.remove('active')});
  if(tab==='profile'){
    document.getElementById('tab-profile').classList.add('active');
    renderProfile(id);
  } else {
    document.getElementById('tab-'+tab).classList.add('active');
    if(tab==='dashboard')renderDash();
    if(tab==='add'){editId=null;renderForm(null);}
    if(tab==='aswesuma')renderAswesuma();
    if(tab==='search')renderSearch('');
    if(tab==='qurbani')renderQurbani(null);
  }
}
window.showTab=showTab;

async function saveToFirebase(fam){
  setSyncDot('syncing');
  try{await setDoc(doc(db,COL,fam.id),fam);setSyncDot('online');return true;}
  catch(e){setSyncDot('offline');toast('Saved locally — will sync when online');return false;}
}

async function deleteFromFirebase(id){
  setSyncDot('syncing');
  try{await deleteDoc(doc(db,COL,id));setSyncDot('online');}
  catch(e){setSyncDot('offline');}
}

function fiHTML(f){
  var mc=1+(f.members||[]).length;
  return '<div class="fi" onclick="showTab(\'profile\',\''+f.id+'\')">'
    +'<div class="av" style="width:42px;height:42px;font-size:15px">'+ini(f.headName)+'</div>'
    +'<div style="flex:1"><div class="fn">'+(f.headName||'Unknown')+'</div>'
    +'<div class="fnic">NIC: '+(f.nic||'-')+' &nbsp;·&nbsp; '+mc+' member'+(mc>1?'s':'')+'</div>'
    +'<div class="tags">'
    +(f.ration?'<span class="tag tg">Ration eligible</span>':'')
    +(f.income==='very-low'?'<span class="tag tr">Very low income</span>':'')
    +(f.income==='low'?'<span class="tag ta">Low income</span>':'')
    +(f.masjid?'<span class="tag tb">'+f.masjid+'</span>':'')

function chkBoxes(items, prefix, saved){
  var sel = saved || [];
  return '<div class="chk-grid">' + items.map(function(item){
    var id = prefix+'-'+item.replace(/[^a-z0-9]/gi,'');
    var checked = sel.indexOf(item) > -1 ? ' checked' : '';
    return '<label class="chk-lbl"><input type="checkbox" id="'+id+'" value="'+item+'"'+checked+'> '+item+'</label>';
  }).join('') + '</div>';
}

function getChecked(prefix, items){
  return items.filter(function(item){
    var el = document.getElementById(prefix+'-'+item.replace(/[^a-z0-9]/gi,''));
    return el && el.checked;
  });
}

async function saveFamily(){
  var nic=g('f-nic');var hn=g('f-hn');
  if(!hn){toast('Please enter head of family name');return}
  if(!nic){toast('Please enter NIC number');return}
  if(!editId&&DB.find(function(f){return f.nic===nic})){toast('A family with this NIC already exists!');return}
  var members=[];
  document.querySelectorAll('#members-cont .member-row').forEach(function(row){
    var n=row.querySelector('.m-n').value.trim();
    if(n)members.push({name:n,nic:row.querySelector('.m-nic').value.trim(),relation:row.querySelector('.m-r').value,dob:row.querySelector('.m-d').value,edu:row.querySelector('.m-e').value,job:row.querySelector('.m-j').value,health:row.querySelector('.m-h').value});
  });
  var fam={
    id:editId||Date.now().toString(),
    headName:hn,nic:nic,dob:g('f-dob'),phone:g('f-ph'),job:g('f-job'),employer:g('f-emp'),
    gender:document.getElementById('f-gender').value,
    edu:document.getElementById('f-edu').value,masjid:g('f-msj'),address:g('f-addr'),
    spouseName:g('f-sn'),spouseNic:g('f-snic'),spouseJob:g('f-sj'),spouseEdu:document.getElementById('f-se').value,
    income:document.getElementById('f-inc').value,housing:document.getElementById('f-hs').value,
    ration:document.getElementById('f-rat').value==='true',
    zakat:document.getElementById('f-zak').value==='true',
    finNotes:g('f-fn'),health:g('f-hlt'),healthNotes:g('f-hln'),
    disability:document.getElementById('f-dis').value==='true',
    disabilityNotes:g('f-disn'),
    pension:document.getElementById('f-pension').value==='true',
    pensionNotes:g('f-pensionNotes'),
    vehicles:getChecked('veh', VEHICLES),
    vehicleNotes:g('f-vehnotes'),
    farmAnimals:getChecked('ani', FARM_ANIMALS),
    animalNotes:g('f-aninotes'),
    amenities:getChecked('ame', AMENITIES),
    amenityNotes:g('f-amenotes'),
    notes:g('f-notes'),members:members,
    addedAt:editId?(DB.find(function(f){return f.id===editId})||{}).addedAt||new Date().toISOString():new Date().toISOString()
  };
  var btn=document.querySelector('.btn-p');if(btn){btn.textContent='Saving...';btn.disabled=true;}
  var ok=await saveToFirebase(fam);
  if(!ok){
    var idx=DB.findIndex(function(f){return f.id===fam.id});
    if(idx>-1)DB[idx]=fam;else DB.unshift(fam);
  }
  toast(editId?'Record updated!':'Family saved to Firebase!');
  showTab('profile',fam.id);
}

var QCATS = [
  {
    key: 'female_headed',
    icon: '👩',
    label: 'Female Headed Households',
    sub: 'Head of family is female',
    filter: function(f){
      return f.gender === 'female';
    }
  },
  {
    key: 'two_plus_children',
    icon: '👨‍👩‍👧‍👦',
    label: '2+ Children Households',
    sub: 'Families with 2 or more children',
    filter: function(f){
      var childRels = ['Son','Daughter','Grandson','Granddaughter'];
      var children = (f.members||[]).filter(function(m){ return childRels.indexOf(m.relation) > -1; });
      return children.length >= 2;
    }
  },
  {
    key: 'older_person',
    icon: '👴',
    label: 'Older Person Households',
    sub: 'Head of family aged 60 or above',
    filter: function(f){
      if(!f.dob) return false;
      var birth = new Date(f.dob);
      if(isNaN(birth)) return false;
      var ageYrs = (new Date() - birth) / (365.25*24*3600*1000);
      return ageYrs >= 60;
    }
  },
  {
    key: 'disability',
    icon: '♿',
    label: 'Households with Disability',
    sub: 'Households with 2+ members with disability',
    filter: function(f){
      var cnt = 0;
      if(f.disability) cnt++;
      (f.members||[]).forEach(function(m){
        if(m.health && m.health.toLowerCase().indexOf('disab') > -1) cnt++;
      });
      return cnt >= 2;
    }
  }
];

function getQCatFamilies(catKey){
  var cat = QCATS.find(function(c){ return c.key === catKey; });
  if(!cat) return [];
  return DB.filter(cat.filter);
}

function exportQCSV(catKey){
  var cat = QCATS.find(function(c){ return c.key === catKey; });
  if(!cat) return;
  var fams = getQCatFamilies(catKey);
  var iLvl = {'very-low':'Very low','low':'Low','medium':'Medium','high':'High'};
  var rows = [['No','Head Name','NIC','Phone','Address','Income Level','Total Members','Spouse Name','Has Disability','Notes']];
  fams.forEach(function(f,i){
    var mc = 1 + (f.members||[]).length;
    rows.push([
      i+1,
      f.headName||'',
      f.nic||'',
      f.phone||'',
      (f.address||'').replace(/,/g,' '),
      iLvl[f.income]||f.income||'',
      mc,
      f.spouseName||'',
      f.disability?'Yes':'No',
      (f.notes||'').replace(/,/g,' ')
    ]);
  });
  var csv = rows.map(function(r){
    return r.map(function(c){ return '"'+String(c).replace(/"/g,'""')+'"'; }).join(',');
  }).join('\n');
  var blob = new Blob([csv], {type:'text/csv'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'qurbani_'+catKey+'_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
  toast('CSV exported — '+fams.length+' records');
}
window.exportQCSV = exportQCSV;

function renderQurbani(selectedKey){
  var counts = {};
  QCATS.forEach(function(c){ counts[c.key] = getQCatFamilies(c.key).length; });

  var html = '<div class="card" style="margin-bottom:10px;padding:12px 14px">'
    +'<div class="card-title" style="margin:0;font-size:13px"><span style="font-size:16px"></span>'
    +' Relief List — Category Report'
    +' <span style="font-weight:400;color:#888;font-size:11px">· Click a category to view families</span>'
    +'</div></div>';

  html += '<div class="qcat-grid">';
  for(var ci=0; ci<QCATS.length; ci++){
    var c = QCATS[ci];
    html += '<div class="qcat-card'+(selectedKey===c.key?' active':'')+'" onclick="window.renderQurbani(\''+c.key+'\')">'
      +'<div class="qcat-icon">'+c.icon+'</div>'
      +'<div class="qcat-count">'+counts[c.key]+'</div>'
      +'<div class="qcat-label">'+c.label+'</div>'
      +'<div class="qcat-sub">'+c.sub+'</div>'
      +'</div>';
  }
  html += '</div>';

  if(selectedKey){
    var selCat = null;
    for(var qi=0; qi<QCATS.length; qi++){ if(QCATS[qi].key===selectedKey){ selCat=QCATS[qi]; break; } }
    if(selCat){
      var fams = getQCatFamilies(selectedKey);
      var incLbl = {'very-low':'Very low income','low':'Low income','medium':'Medium income','high':'High income'};
      html += '<div class="card">';
      html += '<div class="qcat-list-header">';
      html += '<div class="qcat-list-title"><span style="font-size:18px">'+selCat.icon+'</span>&nbsp;'+selCat.label
        +' <span style="font-weight:400;color:#888;font-size:12px">('+fams.length+' families)</span></div>';
      html += '<button class="export-btn" onclick="window.exportQCSV(\''+selectedKey+'\')">⬇ Export CSV</button>';
      html += '</div>';
      if(fams.length){
        for(var fi=0; fi<fams.length; fi++){
          var f = fams[fi];
          var mc = 1+(f.members||[]).length;
          var itag = '';
          if(f.income==='very-low') itag='<span class="tag tr">Very low income</span>';
          else if(f.income==='low') itag='<span class="tag ta">Low income</span>';
          else if(f.income==='medium') itag='<span class="tag tb">Medium income</span>';
          html += '<div class="fi" onclick="showTab(\'profile\',\''+f.id+'\')">'+
            '<span style="font-size:12px;font-weight:500;color:var(--color-text-secondary);width:22px;text-align:center">'+(fi+1)+'</span>'+
            '<div class="av" style="width:42px;height:42px;font-size:15px">'+ini(f.headName)+'</div>'+
            '<div style="flex:1">'+
            '<div class="fn">'+(f.headName||'Unknown')+'</div>'+
            '<div class="fnic">NIC: '+(f.nic||'-')+' &nbsp;·&nbsp; '+(f.address||'No address')+'</div>'+
            '<div class="tags">'+itag+
            '<span class="tag tg">'+mc+' member'+(mc>1?'s':'')+'</span>'+
            (f.disability?'<span class="tag tr">Disability</span>':'')+
            (f.ration?'<span class="tag tg">Aswesuma</span>':'')+
            '</div></div></div>';
        }
      } else {
        html += '<div class="empty"><div class="ei">'+selCat.icon+'</div><p>No families found in this category.</p></div>';
      }
      html += '</div>';
    }
  }

  document.getElementById('tab-qurbani').innerHTML = html;
}
window.renderQurbani = renderQurbani;

function renderAswesuma(){
  var elig=DB.filter(function(f){return f.ration});
  document.getElementById('tab-aswesuma').innerHTML=
    '<div class="card" style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px">'
    +'<div class="card-title" style="margin:0"><span style="font-size:15px">📦</span> Aswesuma recipient families</div>'
    +'<span style="font-size:13px;font-weight:500;color:#1a472a">'+elig.length+' families</span>'
    +'</div>'
    +(elig.length?elig.map(function(f,i){
      var mc=1+(f.members||[]).length;
      return '<div class="fi" onclick="showTab(\'profile\',\''+f.id+'\')">'
        +'<span style="font-size:12px;font-weight:500;color:var(--color-text-secondary);width:20px;text-align:center">'+(i+1)+'</span>'
        +'<div class="av" style="width:42px;height:42px;font-size:15px">'+ini(f.headName)+'</div>'
        +'<div style="flex:1"><div class="fn">'+f.headName+'</div>'
        +'<div class="fnic">NIC: '+f.nic+' · '+(f.address||'No address')+'</div>'
        +'<div class="tags">'
        +(f.income==='very-low'?'<span class="tag tr">Very low income</span>':f.income==='low'?'<span class="tag ta">Low income</span>':'')
        +'<span class="tag tg">'+mc+' member'+(mc>1?'s':'')+'</span>'
        +'</div></div></div>';
    }).join('')
    :'<div class="empty"><div class="ei">📦</div><p>No families marked as Aswesuma eligible yet.</p></div>');
}
